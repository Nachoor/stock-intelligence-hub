name: Daily stock update

on:
  workflow_dispatch:
  schedule:
    # 02:00 UTC = 04:00 Europe/Madrid during daylight saving time (03:00 in winter).
    - cron: "0 2 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-stock-update
  cancel-in-progress: false

jobs:
  update-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scrapers and rebuild dataset
        env:
          BMW_HEADLESS: "1"
          PLAYWRIGHT_HEADLESS: "1"
        run: python -u run_daily_update.py

      - name: Validate generated dataset
        run: |
          python - <<'PY'
          import pandas as pd
          df = pd.read_csv("STOCK_UNIFICADO_GLOBAL.csv", low_memory=False)
          print(df.shape)
          print(pd.crosstab(df["Market"], df["Brand"]))
          assert len(df) > 1000
          assert df["Market"].nunique() >= 2
          assert df["Brand"].nunique() >= 3
          PY

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STOCK_UNIFICADO_GLOBAL.csv
          if git diff --cached --quiet; then
            echo "No dataset changes to commit."
          else
            git commit -m "Daily stock dataset update"
            # Limpia cualquier cambio sin commitear (xlsx generados, etc.)
            # para que git pull --rebase no falle por "unstaged changes".
            git stash --include-untracked || true
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push failed, retrying ($i)..."
              sleep 5
            done
            git stash drop || true
          fi

      - name: Notify failure with GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = "Daily stock update failed";
            const body = [
              "The daily stock update workflow failed.",
              "",
              `Run: ${runUrl}`,
              `Branch: ${context.ref}`,
              `Commit: ${context.sha}`,
              `Date: ${new Date().toISOString()}`,
              "",
              "Review the failed step in GitHub Actions and rerun the workflow after fixing it."
            ].join("\n");

            const labels = ["automation", "daily-stock-failure"];
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "daily-stock-failure",
              per_page: 1
            });

            if (existing.data.length) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels
              });
            }
